# Publishes aa-customizer to PyPI on every version tag push (v*.*.*).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token secrets required.
#
# One-time PyPI setup:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new Trusted Publisher:
#        PyPI project name : aa-customizer
#        GitHub owner      : Thrainkrilleve
#        Repository        : aa-customizer
#        Workflow filename : publish.yml        ← this file
#        Environment name  : pypi
#   3. Create the "pypi" environment in GitHub:
#        Settings → Environments → New environment → name it "pypi"
#        (optionally restrict to tag pushes and require a reviewer)

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.0.13, v2.0.0, etc.

  # Allow a manual trigger from the Actions tab for testing
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build the wheel + sdist ─────────────────────────────────────────────
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge-base check

      - name: Verify tag is on main branch
        # Prevent accidental publishes triggered by tags pushed from non-main
        # branches (e.g. a 'testing' branch).  On workflow_dispatch there is no
        # tag, so we skip the check.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main" || {
            echo "::error::Tag $GITHUB_REF_NAME is not reachable from 'main'. Publish aborted."
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Stamp version from git tag
        # Keeps pyproject.toml in sync with the tag automatically.
        # On workflow_dispatch (no tag) the version stays whatever is in the file.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          sed -i "s/^version = .*/version = \"${TAG}\"/" pyproject.toml
          echo "Building version ${TAG}"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      # Verify every model change has a committed migration before we build.
      # This prevents publishing a package that requires end-users to run
      # makemigrations themselves.
      - name: Check for missing migrations
        run: |
          pip install "django>=4.2,<7" django-solo Pillow
          python - <<'EOF'
          import django
          from django.conf import settings
          settings.configure(
              INSTALLED_APPS=[
                  "django.contrib.contenttypes",
                  "django.contrib.auth",
                  "solo",
                  "aa_customizer",
              ],
              DATABASES={"default": {"ENGINE": "django.db.backends.sqlite3", "NAME": ":memory:"}},
              DEFAULT_AUTO_FIELD="django.db.models.AutoField",
          )
          django.setup()
          from django.db.migrations.autodetector import MigrationAutodetector
          from django.db.migrations.loader import MigrationLoader
          from django.db.migrations.state import ProjectState
          from django.apps import apps
          import sys

          loader = MigrationLoader(None, ignore_no_migrations=True)
          autodetector = MigrationAutodetector(
              loader.project_state(),
              ProjectState.from_apps(apps),
          )
          changes = autodetector.changes(graph=loader.graph).get("aa_customizer", [])
          if changes:
              print("ERROR: Unmigrated model changes detected in aa_customizer!")
              print("Run 'python manage.py makemigrations aa_customizer' and commit the result.")
              sys.exit(1)
          print("Migration check passed — all model changes are covered.")
          EOF

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload built packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  # ── 2. Publish to PyPI using API token ────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/aa-customizer

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
