# Publishes aa-customizer to PyPI on every version tag push (v*.*.*).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token secrets required.
#
# One-time PyPI setup:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new Trusted Publisher:
#        PyPI project name : aa-customizer
#        GitHub owner      : Thrainkrilleve
#        Repository        : aa-customizer
#        Workflow filename : publish.yml        ← this file
#        Environment name  : pypi
#   3. Create the "pypi" environment in GitHub:
#        Settings → Environments → New environment → name it "pypi"
#        (optionally restrict to tag pushes and require a reviewer)

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.0.13, v2.0.0, etc.

  # Allow a manual trigger from the Actions tab for testing
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Build the wheel + sdist ─────────────────────────────────────────────
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload built packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  # ── 2. Publish to PyPI using Trusted Publishing (OIDC) ────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # This environment must exist in GitHub Settings → Environments and must
    # match the environment name you enter on the PyPI Trusted Publisher form.
    environment:
      name: pypi
      url: https://pypi.org/p/aa-customizer

    # Trusted Publishing requires id-token:write so GitHub can generate an
    # OIDC token for PyPI to verify.  No PyPI API token secret is needed.
    permissions:
      id-token: write

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
